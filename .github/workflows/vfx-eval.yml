name: VFX Evaluation Agent

on:
  push:
    paths:
      - 'inbox/**'
    branches:
      - main

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai Pillow requests

      - name: Run VFX evaluation agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python scripts/vfx_eval_agent.py

      - name: Commit results
        run: |
          git config user.name "VFX Eval Bot"
          git config user.email "vfx-bot@nexon.com"
          git add projects/nexon/mabinogi-eternity/evaluations/results/
          git add inbox/
          git diff --staged --quiet || git commit -m "chore: auto VFX evaluation result [skip ci]"
          git push
