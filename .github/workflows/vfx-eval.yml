name: VFX Evaluation Agent

on:
  push:
    paths:
      - 'inbox/**'
    branches:
      - main

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for newly added images
        id: check
        run: |
          IMAGES=$(find inbox/ -maxdepth 1 -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.gif" -o -iname "*.webp" \) | head -1)
          if [ -z "$IMAGES" ]; then
            echo "has_images=false" >> $GITHUB_OUTPUT
            echo "inbox에 이미지 없음. 스킵."
          else
            echo "has_images=true" >> $GITHUB_OUTPUT
            echo "처리할 이미지 발견: $IMAGES"
          fi

      - name: Test Notion proxy connection
        run: |
          echo "Notion 프록시 연결 테스트..."
          curl -s -o /tmp/notion_test.json -w "%{http_code}" \
            -H "Notion-Version: 2025-09-03" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            https://notion-pat-proxy.nexon.co.kr/v1/users/me
          echo ""
          cat /tmp/notion_test.json

      - name: Install dependencies
        if: steps.check.outputs.has_images == 'true'
        run: pip install anthropic requests

      - name: Run VFX evaluation agent
        if: steps.check.outputs.has_images == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python agents/vfx-evaluator/runner.py

      - name: Generate dashboard
        if: steps.check.outputs.has_images == 'true'
        run: python scripts/generate_dashboard.py

      - name: Commit results
        if: steps.check.outputs.has_images == 'true'
        run: |
          git config user.name "VFX Eval Bot"
          git config user.email "vfx-bot@nexon.com"
          git add projects/nexon/mabinogi-eternity/evaluations/results/
          git add inbox/
          git add docs/
          git diff --staged --quiet || git commit -m "chore: auto VFX evaluation result [skip ci]"
          git push
